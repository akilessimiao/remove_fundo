<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Studio PRO | Responsivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05050f; --accent: #00f0ff; --bg2: #0a0a1f; }
        body { background: var(--bg); color: #e0f7ff; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* Container principal responsivo */
        .main-container { width: 95%; max-width: 600px; margin: 20px auto; padding: 15px; background: var(--bg2); border: 1px solid rgba(0, 240, 255, 0.1); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .btn-neon { border: 1px solid var(--accent); color: var(--accent); background: rgba(0,240,255,0.05); transition: 0.3s; width: 100%; padding: 18px; border-radius: 12px; font-weight: bold; text-transform: uppercase; font-size: 13px; }
        .btn-neon:active { background: var(--accent); color: #000; transform: scale(0.98); }
        
        /* Ajuste do Canvas para não estourar a tela */
        canvas { width: 100% !important; height: auto !important; border-radius: 12px; border: 1px solid var(--accent); margin-top: 15px; }
        
        .progress-bar-bg { width: 100%; background: rgba(255,255,255,0.05); height: 12px; border-radius: 6px; margin: 15px 0; overflow: hidden; }
        #progress_fill { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 15px var(--accent); transition: width 0.1s linear; }
    </style>
</head>
<body>

    <main class="main-container text-center">
        <header class="mb-6">
            <h1 class="font-orbitron text-accent text-lg">TANQUE DIGITAL</h1>
            <p class="text-[9px] tracking-[3px] opacity-50 uppercase">Studio AI Mobile Ready</p>
        </header>

        <div id="setup_area" class="space-y-4">
            <div class="p-4 bg-black/30 rounded-xl border border-white/5">
                <p class="text-[11px] mb-4 opacity-70">Toque abaixo para subir o vídeo do baixista</p>
                <button onclick="document.getElementById('video_input').click()" class="btn-neon font-orbitron">
                    📂 Selecionar Vídeo
                </button>
                <input type="file" id="video_input" accept="video/*" class="hidden">
            </div>
        </div>

        <div id="processing_status" class="hidden">
            <p class="font-orbitron text-[10px] text-accent animate-pulse">Processando Áudio e Vídeo...</p>
            <div class="progress-bar-bg">
                <div id="progress_fill"></div>
            </div>
            <p id="percent_text" class="text-xs font-bold font-orbitron">0%</p>
            <button onclick="location.reload()" class="mt-4 text-[10px] text-red-400 opacity-60">Cancelar</button>
        </div>

        <canvas id="output_canvas" class="hidden"></canvas>

        <div id="download_area" class="hidden py-6">
            <a id="download_link" href="#" download="VIDEO_PRO_ESTUDIO.webm" class="btn-neon bg-accent text-black inline-block shadow-[0_0_20px_#00f0ff] animate-bounce">
                📥 Baixar Vídeo Pronto
            </a>
            <button onclick="location.reload()" class="block w-full mt-6 text-[10px] opacity-40">Processar outro vídeo</button>
        </div>

        <video id="input_video" class="hidden" crossorigin="anonymous" muted playsinline></video>
    </main>

    <script>
        const video = document.getElementById('input_video');
        const canvas = document.getElementById('output_canvas');
        const ctx = canvas.getContext('2d');
        const progressFill = document.getElementById('progress_fill');
        const percentText = document.getElementById('percent_text');
        const downloadArea = document.getElementById('download_area');
        
        let recorder;
        let chunks = [];

        const bg = new Image();
        bg.crossOrigin = "anonymous";
        bg.src = 'https://r.jina.ai/i/060e2996e3e5495589c379a257540938';

        const selfie = new SelfieSegmentation({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`});
        selfie.setOptions({ modelSelection: 1 });
        selfie.onResults(results => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (bg.complete) ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'destination-in';
            ctx.drawImage(results.segmentationMask, 0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'destination-over';
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            ctx.restore();

            if (video.duration) {
                const p = (video.currentTime / video.duration) * 100;
                progressFill.style.width = p + '%';
                percentText.innerText = Math.round(p) + '%';
            }
        });

        document.getElementById('video_input').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('setup_area').classList.add('hidden');
                document.getElementById('processing_status').classList.remove('hidden');
                video.src = URL.createObjectURL(file);
                video.onloadeddata = () => {
                    canvas.classList.remove('hidden');
                    video.play();
                    startRec();
                    loop();
                };
            }
        };

        async function loop() {
            if(!video.paused && !video.ended) {
                await selfie.send({image: video});
                requestAnimationFrame(loop);
            } else if (video.ended) {
                if (recorder && recorder.state !== "inactive") recorder.stop();
            }
        }

        function startRec() {
            chunks = [];
            const stream = canvas.captureStream(30);
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaElementSource(video);
            const dest = audioCtx.createMediaStreamDestination();
            source.connect(dest);
            source.connect(audioCtx.destination);
            
            const combined = new MediaStream([...stream.getTracks(), ...dest.stream.getTracks()]);
            recorder = new MediaRecorder(combined, { mimeType: 'video/webm' });
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                document.getElementById('download_link').href = URL.createObjectURL(blob);
                downloadArea.classList.remove('hidden');
                document.getElementById('processing_status').classList.add('hidden');
            };
            recorder.start();
        }
    </script>
</body>
</html>
